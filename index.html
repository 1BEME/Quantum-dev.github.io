<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantum Dev — We Build Websites & Apps That Convert</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #030508;
    --navy: #060d1a;
    --blue: #0a1628;
    --accent: #00d4ff;
    --accent2: #0099cc;
    --teal: #00ffcc;
    --white: #f0f4f8;
    --muted: #6b7a8d;
    --border: rgba(0, 212, 255, 0.12);
    --glow: rgba(0, 212, 255, 0.2);
    --font-display: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --font-mono: 'Space Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; overflow-x: hidden; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: var(--font-body);
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* ─── NOISE OVERLAY ─── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: var(--black); }
  ::-webkit-scrollbar-thumb { background: var(--accent); }

  /* ─── NAV ─── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 20px 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: background 0.4s, padding 0.4s;
  }
  nav.scrolled {
    background: rgba(3, 5, 8, 0.92);
    backdrop-filter: blur(20px);
    padding: 14px 60px;
    border-bottom: 1px solid var(--border);
  }

  .nav-logo {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--white);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .nav-logo span {
    color: var(--accent);
  }
  .logo-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 12px var(--accent); }
    50% { opacity: 0.5; box-shadow: 0 0 4px var(--accent); }
  }

  .nav-links {
    display: flex;
    gap: 36px;
    list-style: none;
  }
  .nav-links a {
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 0.5px;
    transition: color 0.3s;
    text-transform: uppercase;
  }
  .nav-links a:hover { color: var(--white); }

  .nav-cta {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--accent);
    text-decoration: none;
    border: 1px solid var(--accent);
    padding: 10px 22px;
    letter-spacing: 0.5px;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }
  .nav-cta::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    transform: translateX(-100%);
    transition: transform 0.3s;
  }
  .nav-cta:hover { color: var(--black); }
  .nav-cta:hover::before { transform: translateX(0); }
  .nav-cta span { position: relative; z-index: 1; }

  /* ─── HERO ─── */
  #hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    position: relative;
    overflow: hidden;
    padding: 120px 60px 80px;
  }

  .hero-grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
    background-size: 80px 80px;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
  }

  .hero-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
  }
  .orb-1 {
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(0,212,255,0.15) 0%, transparent 70%);
    top: -100px; right: -100px;
    animation: orbFloat 8s ease-in-out infinite;
  }
  .orb-2 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(0,255,204,0.08) 0%, transparent 70%);
    bottom: 0; left: 10%;
    animation: orbFloat 10s ease-in-out infinite reverse;
  }
  @keyframes orbFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-40px); }
  }

  .hero-content {
    position: relative;
    max-width: 800px;
    z-index: 2;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 32px;
    padding: 8px 16px;
    border: 1px solid var(--border);
    background: rgba(0,212,255,0.05);
    opacity: 0;
    animation: fadeUp 0.8s 0.2s forwards;
  }
  .badge-line {
    width: 20px;
    height: 1px;
    background: var(--accent);
  }

  .hero-title {
    font-family: var(--font-display);
    font-size: clamp(44px, 7vw, 96px);
    font-weight: 800;
    line-height: 0.95;
    letter-spacing: -3px;
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 0.8s 0.4s forwards;
  }
  .hero-title em {
    font-style: normal;
    color: transparent;
    -webkit-text-stroke: 1px rgba(0,212,255,0.6);
  }
  .hero-title .accent-word {
    color: var(--accent);
    position: relative;
  }

  .hero-sub {
    font-size: 17px;
    font-weight: 300;
    color: var(--muted);
    max-width: 480px;
    margin-bottom: 48px;
    line-height: 1.8;
    opacity: 0;
    animation: fadeUp 0.8s 0.6s forwards;
  }

  .hero-actions {
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
    opacity: 0;
    animation: fadeUp 0.8s 0.8s forwards;
  }

  .btn-primary {
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--black);
    background: var(--accent);
    padding: 16px 36px;
    text-decoration: none;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
    clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
  }
  .btn-primary:hover {
    background: var(--teal);
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(0,212,255,0.4);
  }

  .btn-secondary {
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 500;
    color: var(--white);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: gap 0.3s;
  }
  .btn-secondary:hover { gap: 14px; color: var(--accent); }
  .btn-arrow { font-size: 18px; }

  .hero-stats {
    position: absolute;
    right: 60px;
    bottom: 80px;
    display: flex;
    flex-direction: column;
    gap: 32px;
    opacity: 0;
    animation: fadeLeft 0.8s 1.2s forwards;
  }
  .stat-item {
    text-align: right;
    border-right: 2px solid var(--accent);
    padding-right: 20px;
  }
  .stat-num {
    font-family: var(--font-display);
    font-size: 36px;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
  }
  .stat-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-top: 4px;
  }

  .scroll-indicator {
    position: absolute;
    bottom: 40px;
    left: 60px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 0.8s 1.4s forwards;
  }
  .scroll-line {
    width: 40px;
    height: 1px;
    background: var(--muted);
    position: relative;
    overflow: hidden;
  }
  .scroll-line::after {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    animation: scanLine 2s infinite;
  }
  @keyframes scanLine {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(200%); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeLeft {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
  }

  /* ─── MARQUEE ─── */
  .marquee-wrap {
    overflow: hidden;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 18px 0;
    background: rgba(0,212,255,0.02);
  }
  .marquee-track {
    display: flex;
    width: max-content;
    animation: marquee 25s linear infinite;
    gap: 0;
  }
  .marquee-item {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 40px;
    white-space: nowrap;
  }
  .marquee-item span { color: var(--accent); margin-right: 40px; }
  @keyframes marquee {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  /* ─── SECTIONS ─── */
  section { padding: 100px 60px; }

  .section-tag {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-tag::before {
    content: '';
    width: 24px;
    height: 1px;
    background: var(--accent);
  }

  .section-title {
    font-family: var(--font-display);
    font-size: clamp(32px, 4vw, 56px);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -2px;
    margin-bottom: 20px;
  }
  .section-title em {
    font-style: normal;
    color: transparent;
    -webkit-text-stroke: 1px rgba(0,212,255,0.5);
  }

  /* ─── ABOUT ─── */
  #about {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: center;
  }

  .about-visual {
    position: relative;
  }
  .about-card {
    background: rgba(0,212,255,0.03);
    border: 1px solid var(--border);
    padding: 48px;
    position: relative;
    overflow: hidden;
  }
  .about-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: shimmer 3s infinite;
  }
  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }
  .about-metric {
    display: flex;
    flex-direction: column;
    gap: 24px;
  }
  .metric-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .metric-row:last-child { border-bottom: none; padding-bottom: 0; }
  .metric-label { font-size: 13px; color: var(--muted); }
  .metric-value {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 800;
    color: var(--accent);
  }
  .metric-bar {
    width: 100%;
    height: 2px;
    background: var(--border);
    margin-top: 8px;
    border-radius: 2px;
    overflow: hidden;
  }
  .metric-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 2px;
    transition: width 1.5s ease;
    width: 0;
  }
  .metric-fill.animated { width: var(--target-width); }

  .floating-badge {
    position: absolute;
    bottom: -20px;
    right: 30px;
    background: var(--black);
    border: 1px solid var(--accent);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .fb-icon { font-size: 24px; }
  .fb-text { font-size: 13px; font-weight: 500; }
  .fb-sub { font-size: 11px; color: var(--accent); font-family: var(--font-mono); }

  .about-text .section-title { margin-bottom: 24px; }
  .about-desc {
    font-size: 16px;
    font-weight: 300;
    color: var(--muted);
    line-height: 1.9;
    margin-bottom: 16px;
  }
  .about-desc strong { color: var(--white); font-weight: 500; }

  .about-list {
    margin-top: 32px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    list-style: none;
  }
  .about-list li {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 14px;
    color: var(--muted);
  }
  .about-list li::before {
    content: '→';
    color: var(--accent);
    font-family: var(--font-mono);
  }

  /* ─── SERVICES ─── */
  #services { background: rgba(0,13,26,0.5); }
  .services-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 60px;
  }
  .services-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 2px;
    background: var(--border);
  }
  .service-card {
    background: var(--black);
    padding: 48px;
    position: relative;
    overflow: hidden;
    cursor: default;
    transition: background 0.4s;
  }
  .service-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,212,255,0.05) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.4s;
  }
  .service-card:hover { background: rgba(0,12,22,1); }
  .service-card:hover::after { opacity: 1; }

  .service-num {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--border);
    letter-spacing: 2px;
    margin-bottom: 24px;
    color: rgba(0,212,255,0.3);
  }
  .service-icon {
    font-size: 32px;
    margin-bottom: 20px;
    display: block;
  }
  .service-name {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 12px;
  }
  .service-desc {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.8;
    margin-bottom: 28px;
  }
  .service-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .tag {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--accent);
    border: 1px solid var(--border);
    padding: 5px 12px;
    text-transform: uppercase;
  }
  .service-arrow {
    position: absolute;
    top: 48px;
    right: 48px;
    color: var(--border);
    font-size: 20px;
    transition: all 0.3s;
  }
  .service-card:hover .service-arrow {
    color: var(--accent);
    transform: translate(4px, -4px);
  }

  /* ─── PORTFOLIO ─── */
  #portfolio {}
  .portfolio-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 60px;
  }
  .portfolio-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
    background: var(--border);
    margin-bottom: 2px;
  }
  .portfolio-grid.bottom { grid-template-columns: 1fr 2fr; }

  .project-card {
    background: var(--navy);
    position: relative;
    overflow: hidden;
    aspect-ratio: 4/3;
    cursor: pointer;
  }
  .project-card.tall { aspect-ratio: 3/4; }
  .project-card.wide { aspect-ratio: 16/7; }

  .project-bg {
    position: absolute;
    inset: 0;
    transition: transform 0.6s ease;
  }
  .project-card:hover .project-bg { transform: scale(1.05); }

  .bg-1 { background: linear-gradient(135deg, #0a1628 0%, #001a35 50%, #002244 100%); }
  .bg-2 { background: linear-gradient(135deg, #080d14 0%, #0d1520 50%, #001122 100%); }
  .bg-3 { background: linear-gradient(135deg, #04090e 0%, #081018 50%, #0a1520 100%); }
  .bg-4 { background: linear-gradient(135deg, #060b12 0%, #0a0f18 50%, #060a14 100%); }
  .bg-5 { background: linear-gradient(135deg, #060c14 0%, #0a1220 100%); }

  .project-mockup {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.6;
  }
  .mock-browser {
    width: 75%;
    background: rgba(0,212,255,0.05);
    border: 1px solid rgba(0,212,255,0.15);
    border-radius: 4px;
  }
  .mock-bar {
    padding: 8px 12px;
    border-bottom: 1px solid rgba(0,212,255,0.1);
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .mock-dot { width: 7px; height: 7px; border-radius: 50%; }
  .mock-dot:nth-child(1) { background: rgba(255,100,100,0.5); }
  .mock-dot:nth-child(2) { background: rgba(255,200,100,0.5); }
  .mock-dot:nth-child(3) { background: rgba(100,255,100,0.5); }
  .mock-url {
    flex: 1;
    height: 14px;
    background: rgba(0,212,255,0.06);
    border-radius: 2px;
    margin-left: 8px;
  }
  .mock-content { padding: 12px; }
  .mock-hero { height: 60px; background: rgba(0,212,255,0.08); border-radius: 2px; margin-bottom: 8px; }
  .mock-line { height: 6px; background: rgba(0,212,255,0.05); border-radius: 2px; margin-bottom: 6px; }
  .mock-line.w70 { width: 70%; }
  .mock-line.w50 { width: 50%; }
  .mock-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-top: 8px; }
  .mock-box { height: 30px; background: rgba(0,212,255,0.06); border-radius: 2px; }

  .project-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(3,5,8,0.95) 0%, rgba(3,5,8,0.3) 50%, transparent 100%);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 28px;
    transform: translateY(20px);
    opacity: 0;
    transition: all 0.4s;
  }
  .project-card:hover .project-overlay { opacity: 1; transform: translateY(0); }

  .project-type {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .project-title-card {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 6px;
    letter-spacing: -0.5px;
  }
  .project-result {
    font-size: 12px;
    color: var(--teal);
    font-family: var(--font-mono);
  }

  .project-label {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(3,5,8,0.8);
    border: 1px solid var(--border);
    padding: 6px 14px;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
    backdrop-filter: blur(10px);
  }

  /* ─── PROCESS ─── */
  #process {
    background: rgba(0,13,26,0.3);
  }
  .process-intro {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: end;
    margin-bottom: 80px;
  }
  .process-steps {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    position: relative;
  }
  .process-steps::before {
    content: '';
    position: absolute;
    top: 32px;
    left: 60px;
    right: 60px;
    height: 1px;
    background: linear-gradient(90deg, var(--accent), transparent 25%, transparent 75%, var(--accent));
    opacity: 0.3;
  }
  .step {
    padding: 32px 24px;
    position: relative;
    transition: background 0.3s;
  }
  .step:hover { background: rgba(0,212,255,0.03); }
  .step-num-wrap {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
  }
  .step-num {
    width: 48px; height: 48px;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-mono);
